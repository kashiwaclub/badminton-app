<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バドミントン 試合ローテーション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        meta[name="apple-mobile-web-app-capable"] { content: "yes"; }
        meta[name="apple-mobile-web-app-status-bar-style"] { content: "black-translucent"; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active {
            border-color: #0ea5e9;
            color: #0ea5e9;
            background-color: #f0f9ff;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700 font-sans min-h-screen pb-12">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 px-4 py-3 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold text-slate-800 tracking-tight">バドローテ App Pro</h1>
            <div class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
                <span id="timer-display" class="font-mono text-lg font-bold text-slate-800">08:00</span>
                <button id="btn-timer-toggle" class="bg-sky-500 hover:bg-sky-600 text-white text-xs px-2.5 py-1 rounded-full font-medium transition">
                    スタート
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">
        
        <div class="flex border-b border-slate-200 mb-4 bg-white rounded-t shadow-sm">
            <button onclick="switchTab('tab-match')" id="btn-tab-match" class="tab-btn active flex-1 text-center py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 transition">
                試合表示
            </button>
            <button onclick="switchTab('tab-member')" id="btn-tab-member" class="tab-btn flex-1 text-center py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 transition">
                メンバー管理・回数
            </button>
        </div>

        <!-- タブ1: 試合表示 -->
        <div id="tab-match" class="tab-content active space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-3">
                <div class="flex items-center justify-between gap-4">
                    <div class="flex items-center gap-1.5">
                        <label class="text-xs font-bold text-slate-500 whitespace-nowrap">コート数:</label>
                        <select id="select-courts" class="bg-slate-50 border border-slate-300 rounded px-2 py-1 text-sm font-bold text-slate-700 focus:outline-none focus:border-sky-500">
                            <option value="1">1面</option>
                            <option value="2">2面</option>
                            <option value="3" selected>3面</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <label class="text-xs font-bold text-slate-500 whitespace-nowrap">時間設定:</label>
                        <input type="number" id="input-timer-min" value="8" min="1" max="60" class="w-12 bg-slate-50 border border-slate-300 rounded px-1.5 py-1 text-sm font-bold text-center text-slate-700 focus:outline-none focus:border-sky-500">
                        <span class="text-xs font-bold text-slate-500">分</span>
                    </div>
                </div>
                <button id="btn-draw" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-2.5 rounded-lg shadow transition text-center block">
                    試合抽選 (次の試合へ)
                </button>
            </div>

            <!-- 通知メッセージエリア -->
            <div id="alert-msg-container" class="hidden bg-amber-50 border border-amber-200 p-3 rounded-lg text-xs text-amber-700 font-medium"></div>

            <div class="flex justify-between items-center">
                <h2 id="text-match-number" class="text-base font-bold text-slate-800 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-slate-200">
                    第0試合
                </h2>
                <button id="btn-reset-match" class="text-xs text-slate-400 hover:text-slate-600 transition underline">
                    試合数をリセット
                </button>
            </div>

            <div id="courts-list" class="space-y-3">
                <div class="text-center py-8 text-slate-400 text-sm bg-white rounded-xl border border-dashed border-slate-300">
                    「試合抽選」ボタンを押すとここにコートが割り振られます
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 pb-1 border-b border-slate-100">
                    今回のお休み
                </h3>
                <div id="rest-list" class="flex flex-wrap gap-2">
                    <span class="text-sm text-slate-400 italic">なし</span>
                </div>
            </div>
        </div>

        <!-- タブ2: メンバー管理 -->
        <div id="tab-member" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold text-slate-700 mb-2">メンバーの参加・不参加設定</h3>
                <p class="text-xs text-slate-400 mb-4">今日参加する番号をオンにしてください。タップで切り替えます。</p>
                
                <div class="mb-4">
                    <h4 class="text-xs font-bold text-sky-600 mb-2 flex justify-between items-center">
                        <span>男性 (青)</span>
                    </h4>
                    <div id="male-toggle-container" class="grid grid-cols-5 gap-1.5"></div>
                </div>

                <div>
                    <h4 class="text-xs font-bold text-rose-600 mb-2 flex justify-between items-center">
                        <span>女性 (赤)</span>
                    </h4>
                    <div id="female-toggle-container" class="grid grid-cols-5 gap-1.5"></div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-3 pb-1 border-b border-slate-100">
                    <h3 class="text-sm font-bold text-slate-700">お休み回数リスト</h3>
                    <button id="btn-reset-counts" class="text-xs text-rose-500 hover:text-rose-700 font-medium transition underline">
                        全てをリセット (重複履歴も消去)
                    </button>
                </div>
                <div class="max-h-64 overflow-y-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-left text-xs font-bold text-slate-400 border-b border-slate-100">
                                <th class="pb-1">メンバー</th>
                                <th class="pb-1">性別</th>
                                <th class="pb-1 text-right">お休み回数</th>
                            </tr>
                        </thead>
                        <tbody id="table-rest-counts"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 状態管理 ---
        let players = [];
        let matchCount = 0;
        let courtsCount = 3;
        
        // 重複度記録用オブジェクト
        let pairHistory = {}; // {'M1-M2': 2}
        let enemyHistory = {}; // {'M1-F1': 1}
        let courtHistory = {}; // {'M1-1': 2}（誰が何コートに何回入ったか）

        // タイマー
        let timerSecondsTotal = 8 * 60;
        let timerSecondsLeft = 8 * 60;
        let timerId = null;
        let isTimerRunning = false;

        function initPlayers() {
            players = [];
            // 男1〜20, 女1〜20
            for(let i = 1; i <= 20; i++) {
                players.push({ id: 'M' + i, name: '男' + i, gender: 'M', active: i <= 12, restCount: 0, restStreak: 0 });
            }
            for(let i = 1; i <= 20; i++) {
                players.push({ id: 'F' + i, name: '女' + i, gender: 'F', active: i <= 12, restCount: 0, restStreak: 0 });
            }
            // 履歴リセット
            pairHistory = {};
            enemyHistory = {};
            courtHistory = {};
        }

        // 履歴カウント取得補助関数
        function getPairCount(p1, p2) {
            let key = [p1, p2].sort().join('-');
            return pairHistory[key] || 0;
        }
        function addPairCount(p1, p2) {
            let key = [p1, p2].sort().join('-');
            pairHistory[key] = (pairHistory[key] || 0) + 1;
        }
        function getEnemyCount(p1, p2) {
            let key = [p1, p2].sort().join('-');
            return enemyHistory[key] || 0;
        }
        function addEnemyCount(p1, p2) {
            let key = [p1, p2].sort().join('-');
            enemyHistory[key] = (enemyHistory[key] || 0) + 1;
        }
        function getCourtCount(pid, cNum) {
            let key = `${pid}-${cNum}`;
            return courtHistory[key] || 0;
        }
        function addCourtCount(pid, cNum) {
            let key = `${pid}-${cNum}`;
            courtHistory[key] = (courtHistory[key] || 0) + 1;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'tab-match') document.getElementById('btn-tab-match').classList.add('active');
            if(tabId === 'tab-member') document.getElementById('btn-tab-member').classList.add('active');
            if(tabId === 'tab-member') {
                renderMemberManagement();
                renderRestCountsTable();
            }
        }

        function renderMemberManagement() {
            const maleContainer = document.getElementById('male-toggle-container');
            const femaleContainer = document.getElementById('female-toggle-container');
            maleContainer.innerHTML = '';
            femaleContainer.innerHTML = '';
            
            players.forEach(p => {
                const btn = document.createElement('button');
                btn.className = `text-xs font-bold py-2 rounded-lg border transition shadow-sm text-center`;
                btn.textContent = p.name;
                
                if(p.gender === 'M') {
                    if(p.active) btn.className += ' bg-sky-100 text-sky-800 border-sky-300';
                    else btn.className += ' bg-slate-100 text-slate-400 border-slate-200 line-through';
                    btn.onclick = () => { p.active = !p.active; renderMemberManagement(); };
                    maleContainer.appendChild(btn);
                } else {
                    if(p.active) btn.className += ' bg-rose-100 text-rose-800 border-rose-300';
                    else btn.className += ' bg-slate-100 text-slate-400 border-slate-200 line-through';
                    btn.onclick = () => { p.active = !p.active; renderMemberManagement(); };
                    femaleContainer.appendChild(btn);
                }
            });
        }

        function renderRestCountsTable() {
            const tbody = document.getElementById('table-rest-counts');
            tbody.innerHTML = '';
            const sorted = [...players].sort((a, b) => {
                if(a.active !== b.active) return b.active - a.active;
                return b.restCount - a.restCount;
            });
            sorted.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = `border-b border-slate-100 py-1.5 ${p.active ? '' : 'opacity-40'}`;
                const genderBadge = p.gender === 'M' ? '<span class="text-xs bg-sky-50 text-sky-600 px-1.5 py-0.5 rounded">男</span>' : '<span class="text-xs bg-rose-50 text-rose-600 px-1.5 py-0.5 rounded">女</span>';
                const statusStr = p.active ? '' : ' <span class="text-[10px] text-slate-400">(不参加)</span>';
                tr.innerHTML = `
                    <td class="py-2 font-medium">${p.name}${statusStr}</td>
                    <td class="py-2">${genderBadge}</td>
                    <td class="py-2 text-right font-bold font-mono">${p.restCount}回</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- タイマー ---
        const timerDisplay = document.getElementById('timer-display');
        const btnTimerToggle = document.getElementById('btn-timer-toggle');
        const inputTimerMin = document.getElementById('input-timer-min');

        function updateTimerDisplay() {
            const min = Math.floor(timerSecondsLeft / 60);
            const sec = timerSecondsLeft % 60;
            timerDisplay.textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function resetTimer() {
            clearInterval(timerId);
            isTimerRunning = false;
            btnTimerToggle.textContent = 'スタート';
            btnTimerToggle.className = "bg-sky-500 hover:bg-sky-600 text-white text-xs px-2.5 py-1 rounded-full font-medium transition";
            const mins = parseInt(inputTimerMin.value) || 8;
            timerSecondsTotal = mins * 60;
            timerSecondsLeft = timerSecondsTotal;
            updateTimerDisplay();
        }

        inputTimerMin.addEventListener('change', resetTimer);

        btnTimerToggle.addEventListener('click', () => {
            if(isTimerRunning) {
                clearInterval(timerId);
                isTimerRunning = false;
                btnTimerToggle.textContent = 'スタート';
                btnTimerToggle.className = "bg-sky-500 hover:bg-sky-600 text-white text-xs px-2.5 py-1 rounded-full font-medium transition";
            } else {
                isTimerRunning = true;
                btnTimerToggle.textContent = 'ストップ';
                btnTimerToggle.className = "bg-amber-500 hover:bg-amber-600 text-white text-xs px-2.5 py-1 rounded-full font-medium transition";
                timerId = setInterval(() => {
                    if(timerSecondsLeft > 0) {
                        timerSecondsLeft--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerId);
                        isTimerRunning = false;
                        btnTimerToggle.textContent = 'リセット';
                        btnTimerToggle.className = "bg-slate-500 hover:bg-slate-600 text-white text-xs px-2.5 py-1 rounded-full font-medium transition";
                        alert('試合終了の時間です！');
                    }
                }, 1000);
            }
        });

        // --- アルゴリズムの実装（ChatGPT提案ベース） ---
        document.getElementById('btn-draw').addEventListener('click', () => {
            courtsCount = parseInt(document.getElementById('select-courts').value);
            const neededPlayers = courtsCount * 4;
            const activePlayers = players.filter(p => p.active);
            
            const alertBox = document.getElementById('alert-msg-container');
            alertBox.classList.add('hidden');

            if(activePlayers.length < neededPlayers) {
                alert(`参加中のメンバーが足りません。\n現在のコート数に必要な人数: ${neededPlayers}人\n現在オンの人数: ${activePlayers.length}人`);
                return;
            }

            // Step2: スコア算出と優先度ランキング化
            activePlayers.forEach(p => {
                p.score = p.restCount * 100;
                if (p.restStreak === 1) p.score += 1000;
                if (p.restStreak >= 2) p.score += 100000; // 最優先出場
            });

            // 男女別にスコア順（降順）でソート
            let activeMales = activePlayers.filter(p => p.gender === 'M').sort((a,b) => b.score - a.score);
            let activeFemales = activePlayers.filter(p => p.gender === 'F').sort((a,b) => b.score - a.score);

            // Step3 & 4: 男女別の出場候補数の決定と偶数最適化
            let bestMalesCount = 0;
            let bestFemalesCount = 0;
            let minScoreLoss = Infinity;

            // 可能な「男：偶数 / 女：偶数」の組み合わせパターンを総当たりで評価 (数パターンのみ)
            for (let mCount = 0; mCount <= neededPlayers; mCount += 2) {
                let fCount = neededPlayers - mCount;
                if (mCount <= activeMales.length && fCount <= activeFemales.length) {
                    
                    // 休ませてしまう（出場できない）上位メンバーのスコア損失を計算
                    let loss = 0;
                    // 男子で漏れた人のスコア損失
                    for(let i = mCount; i < activeMales.length; i++) {
                        loss += activeMales[i].score;
                    }
                    // 女子で漏れた人のスコア損失
                    for(let i = fCount; i < activeFemales.length; i++) {
                        loss += activeFemales[i].score;
                    }

                    if (loss < minScoreLoss) {
                        minScoreLoss = loss;
                        bestMalesCount = mCount;
                        bestFemalesCount = fCount;
                    }
                }
            }

            // 確定したメンバーを抽出
            let selectedMales = activeMales.slice(0, bestMalesCount);
            let restMales = activeMales.slice(bestMalesCount);

            let selectedFemales = activeFemales.slice(0, bestFemalesCount);
            let restFemales = activeFemales.slice(bestFemalesCount);

            let selectedTotal = [...selectedMales, ...selectedFemales];
            let restTotal = [...restMales, ...restFemales];

            // 2連続お休みが発生してしまったかチェック（数学的に避けられないケース）
            let unpreventableStreak = restTotal.filter(p => p.restStreak >= 1);
            if (unpreventableStreak.length > 0) {
                let names = unpreventableStreak.map(p => p.name).join(', ');
                alertBox.textContent = `【通知】人数の都合上、${names} に連続お休みが発生しました。`;
                alertBox.classList.remove('hidden');
            }

            // Step5 & 6: 100回シャッフルによるペア・対戦相手・コートの最適化
            let bestCourtMatches = null;
            let minPenalty = Infinity;

            for (let iter = 0; iter < 100; iter++) {
                // シャッフル
                let mPool = [...selectedMales].sort(() => Math.random() - 0.5);
                let fPool = [...selectedFemales].sort(() => Math.random() - 0.5);

                let currentMatches = [];
                let currentPenalty = 0;

                // 各コートにペアを割り当てる（男4、女4、またはミックス）
                for (let c = 0; c < courtsCount; c++) {
                    let p1, p2, p3, p4;
                    let cNum = c + 1;

                    if (mPool.length >= 4) {
                        p1 = mPool.shift(); p2 = mPool.shift();
                        p3 = mPool.shift(); p4 = mPool.shift();
                    } else if (fPool.length >= 4) {
                        p1 = fPool.shift(); p2 = fPool.shift();
                        p3 = fPool.shift(); p4 = fPool.shift();
                    } else if (mPool.length >= 2 && fPool.length >= 2) {
                        // ミックスダブス成立の割り当て
                        let m1 = mPool.shift(); let m2 = mPool.shift();
                        let f1 = fPool.shift(); let f2 = fPool.shift();
                        p1 = m1; p2 = f1; // ペアA
                        p3 = m2; p4 = f2; // ペアB
                    }

                    currentMatches.push({ p1, p2, p3, p4, cNum });

                    // 重複ペナルティ計算
                    // ペア重複 (p1-p2, p3-p4)
                    currentPenalty += getPairCount(p1.id, p2.id) * 50;
                    currentPenalty += getPairCount(p3.id, p4.id) * 50;

                    // 対戦相手重複 (p1-p3, p1-p4, p2-p3, p2-p4)
                    currentPenalty += getEnemyCount(p1.id, p3.id) * 10;
                    currentPenalty += getEnemyCount(p1.id, p4.id) * 10;
                    currentPenalty += getEnemyCount(p2.id, p3.id) * 10;
                    currentPenalty += getEnemyCount(p2.id, p4.id) * 10;

                    // コート重複
                    currentPenalty += getCourtCount(p1.id, cNum) * 5;
                    currentPenalty += getCourtCount(p2.id, cNum) * 5;
                    currentPenalty += getCourtCount(p3.id, cNum) * 5;
                    currentPenalty += getCourtCount(p4.id, cNum) * 5;
                }

                if (currentPenalty < minPenalty) {
                    minPenalty = currentPenalty;
                    bestCourtMatches = currentMatches;
                }
            }

            // 最もペナルティが低かった結果を本採用し、履歴に蓄積
            bestCourtMatches.forEach(m => {
                addPairCount(m.p1.id, m.p2.id);
                addPairCount(m.p3.id, m.p4.id);

                addEnemyCount(m.p1.id, m.p3.id); addEnemyCount(m.p1.id, m.p4.id);
                addEnemyCount(m.p2.id, m.p3.id); addEnemyCount(m.p2.id, m.p4.id);

                addCourtCount(m.p1.id, m.cNum); addCourtCount(m.p2.id, m.cNum);
                addCourtCount(m.p3.id, m.cNum); addCourtCount(m.p4.id, m.cNum);
            });

            // プレイヤー全体の状態（お休み・連続お休み数）を更新
            selectedTotal.forEach(p => {
                p.restStreak = 0; // 出場したのでリセット
            });
            restTotal.forEach(p => {
                p.restCount += 1;
                p.restStreak += 1; // 休みを加算
            });

            matchCount++;
            document.getElementById('text-match-number').textContent = `第${matchCount}試合`;
            renderCourts(bestCourtMatches);
            renderRestList(restTotal);
            resetTimer();
        });

        function renderCourts(matches) {
            const container = document.getElementById('courts-list');
            container.innerHTML = '';
            matches.forEach((m) => {
                const courtDiv = document.createElement('div');
                courtDiv.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200";
                const getGenderClass = (p) => p.gender === 'M' ? 'bg-sky-100 text-sky-800 border-sky-200' : 'bg-rose-100 text-rose-800 border-rose-200';
                courtDiv.innerHTML = `
                    <h3 class="text-center font-bold text-slate-400 text-xs uppercase tracking-wider mb-3 pb-1 border-b border-slate-100">${m.cNum}コート</h3>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div class="space-y-1 bg-slate-50/50 p-2 rounded-lg border border-dashed border-slate-200">
                            <div class="text-[10px] text-slate-400 font-bold">ペアA</div>
                            <div class="p-2 rounded font-bold text-sm border ${getGenderClass(m.p1)}">${m.p1.name}</div>
                            <div class="p-2 rounded font-bold text-sm border ${getGenderClass(m.p2)}">${m.p2.name}</div>
                        </div>
                        <div class="space-y-1 bg-slate-50/50 p-2 rounded-lg border border-dashed border-slate-200">
                            <div class="text-[10px] text-slate-400 font-bold">ペアB</div>
                            <div class="p-2 rounded font-bold text-sm border ${getGenderClass(m.p3)}">${m.p3.name}</div>
                            <div class="p-2 rounded font-bold text-sm border ${getGenderClass(m.p4)}">${m.p4.name}</div>
                        </div>
                    </div>`;
                container.appendChild(courtDiv);
            });
        }

        function renderRestList(restPlayers) {
            const container = document.getElementById('rest-list');
            container.innerHTML = '';
            if(restPlayers.length === 0) {
                container.innerHTML = '<span class="text-sm text-slate-400 italic">なし</span>';
                return;
            }
            restPlayers.forEach(p => {
                const span = document.createElement('span');
                const genderClass = p.gender === 'M' ? 'bg-sky-50 text-sky-700 border-sky-200' : 'bg-rose-50 text-rose-700 border-rose-200';
                span.className = `px-3 py-1 rounded-md text-sm font-bold border ${genderClass}`;
                span.textContent = p.name;
                container.appendChild(span);
            });
        }

        document.getElementById('btn-reset-match').addEventListener('click', () => {
            if(confirm('試合数を0に戻しますか？')) {
                matchCount = 0;
                document.getElementById('text-match-number').textContent = `第0試合`;
                document.getElementById('courts-list').innerHTML = `<div class="text-center py-8 text-slate-400 text-sm bg-white rounded-xl border border-dashed border-slate-300">「試合抽選」ボタンを押すとここにコートが割り振られます</div>`;
                document.getElementById('rest-list').innerHTML = '<span class="text-sm text-slate-400 italic">なし</span>';
                players.forEach(p => p.restStreak = 0);
            }
        });

        document.getElementById('btn-reset-counts').addEventListener('click', () => {
            if(confirm('お休み回数と、過去のすべてのペア重複履歴をリセットしますか？')) {
                initPlayers();
                renderRestCountsTable();
                alert('すべての履歴を初期化しました');
            }
        });

        initPlayers();
        resetTimer();
    </script>
</body>
</html>
